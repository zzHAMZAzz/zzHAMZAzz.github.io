<!DOCTYPE html>
<html>

<head>
    <title>Locked App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
</head>

<body style="margin:0;background:#0b0f1a;color:white;font-family:-apple-system;">

<!-- EMPTY APP CONTAINER (nothing loads initially) -->
<div id="app"></div>

<script>
(function () {
    const correct = atob("MTIzNA=="); // 1234
    const input = prompt("Enter password:");

    if (input !== correct) {
        // HARD STOP: do NOT touch existing DOM
        document.body.innerHTML = `
            <div style="
                height:100vh;
                display:flex;
                align-items:center;
                justify-content:center;
                font-size:22px;
                font-family:-apple-system;
            ">
                Access Denied
            </div>
        `;
        return;
    }

    // ONLY LOAD APP IF PASSWORD IS CORRECT
    document.getElementById("app").innerHTML = `
        <h2>BCACarImages</h2>

        <input id="regfield" placeholder="Enter Reg..." style="
            width:100%;padding:12px;border-radius:12px;border:none;margin-bottom:10px;
        ">

        <button onclick="searchImages()" style="
            width:100%;padding:12px;border-radius:12px;border:none;
            background:linear-gradient(135deg,#0a84ff,#409cff);
            color:white;font-weight:600;
        ">Go</button>

        <div id="imageResults" style="margin-top:15px;"></div>

        <h2>REG 2 VIN</h2>

        <input id="inputText" placeholder="Enter Reg..." style="
            width:100%;padding:12px;border-radius:12px;border:none;margin-bottom:10px;
        ">

        <button onclick="executeCurl()" style="
            width:100%;padding:12px;border-radius:12px;border:none;
            background:linear-gradient(135deg,#0a84ff,#409cff);
            color:white;font-weight:600;
        ">Go</button>

        <pre id="output" style="margin-top:15px;"></pre>
    `;
})();
</script>

<script>
async function searchImages() {
    const reg = document.getElementById("regfield").value;
    const box = document.getElementById("imageResults");

    if (!reg) return;

    box.innerHTML = "Loading...";

    try {
        const url = `https://www.bcaimage.com/images/${reg}-gb/beauty,damage`;
        const res = await fetch(url);
        const html = await res.text();

        const doc = new DOMParser().parseFromString(html, "text/html");
        const gallery = doc.querySelector(".gallery");
        const images = gallery ? gallery.querySelectorAll(".thumbnail") : [];

        let out = "<div style='display:flex;flex-wrap:wrap;gap:10px;'>";

        images.forEach(img => {
            const imgTag = img.querySelector("a img");
            const dateTag = img.querySelector("span span");

            if (imgTag && dateTag) {
                const src = imgTag.getAttribute("src");
                const date = dateTag.textContent.trim();

                out += `
                <div style="text-align:center;">
                    <img src="${src}" style="width:200px;border-radius:10px;">
                    <p>${date}</p>
                </div>`;
            }
        });

        box.innerHTML = out;

    } catch (e) {
        box.innerHTML = "Error loading images";
    }
}

async function executeCurl() {
    const reg = document.getElementById("inputText").value.trim().toUpperCase();
    const box = document.getElementById("output");

    if (!reg) return;

    box.innerHTML = "Loading...";

    try {
        const res = await fetch(`https://quiet-lake-1010.hsk10.workers.dev/?reg=${reg}`);
        const data = await res.json();
        const v = data.data;

        box.innerHTML = `
VIN: ${v.vin || "N/A"}<br>
Reg: ${v.reg || reg}<br>
Make: ${v.manufacturer || "N/A"}<br>
Model: ${v.model || "N/A"}<br>
Colour: ${v.colour || "N/A"}<br>
Fuel: ${v.fuel || "N/A"}<br>
Year: ${v.year || "N/A"}
        `;

    } catch (e) {
        box.innerHTML = "Error";
    }
}
</script>

</body>
</html>
