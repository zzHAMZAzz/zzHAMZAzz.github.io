<!DOCTYPE html>
<html>

<head>
    <title>Hamza's GitHub Page</title>
    <meta name='viewport' content='width=320; initial-scale=1.0; maximum-scale=1.0; user-scalable=0;'/>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto;
            background: linear-gradient(180deg, #0b0f1a, #111827);
            color: white;
            margin: 0;
            padding: 20px;
        }

        h2 {
            font-size: 22px;
            font-weight: 600;
        }

        /* ===== INPUT UI ===== */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 16px;
        }

        input {
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.08);
            color: white;
            outline: none;
        }

        button {
            padding: 12px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #0a84ff, #409cff);
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        button:active {
            transform: scale(0.97);
        }

        /* ===== RESULT CARDS ===== */
        #imageResults, #output {
            display: none;
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 14px;
            margin-bottom: 16px;

            opacity: 0;
            transform: translateY(20px);
        }

        /* ANIMATION CLASS */
        .show {
            display: block !important;
            animation: fadeSlide 0.35s ease forwards;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* IMAGE GRID */
        #imageResults div {
            background: rgba(255,255,255,0.05);
            border-radius: 14px;
            padding: 10px;
        }

        /* LIGHTBOX */
        #lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        #lightbox img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 12px;
        }

        /* LOADING TEXT */
        .loading {
            opacity: 0.7;
            font-style: italic;
        }
    </style>
</head>

<body>

<!-- PASSWORD LOCK -->
<script>
const _p = atob("MTIzNA==");
const input = prompt("Enter password:");

if (input !== _p) {
    document.body.innerHTML = "<h1 style='text-align:center;margin-top:50px;'>Access Denied</h1>";
}
</script>

<h2>BCACarImages</h2>

<div class="input-group">
    <input type="text" id="regfield" placeholder="Enter Reg..." />
    <button id="myBtn">Go</button>
</div>

<div id="imageResults"></div>

<div id="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img" src="" />
</div>

<script>
function show(el) {
    el.classList.add("show");
}

function hide(el) {
    el.classList.remove("show");
    el.style.display = "none";
}

document.getElementById("myBtn").addEventListener("click", async function () {
    const reg = document.getElementById("regfield").value;
    const box = document.getElementById("imageResults");

    if (!reg) return alert("Enter registration");

    box.innerHTML = "<p class='loading'>Loading images...</p>";
    show(box);

    try {
        const url = `https://www.bcaimage.com/images/${reg}-gb/beauty,damage`;
        const res = await fetch(url);
        const html = await res.text();

        const doc = new DOMParser().parseFromString(html, "text/html");
        const gallery = doc.querySelector(".gallery");
        const images = gallery ? gallery.querySelectorAll(".thumbnail") : [];

        let out = "<div style='display:flex;flex-wrap:wrap;gap:10px;'>";

        images.forEach(img => {
            const imgTag = img.querySelector("a img");
            const dateTag = img.querySelector("span span");

            if (imgTag && dateTag) {
                const src = imgTag.getAttribute("src");
                const date = dateTag.textContent.trim();

                out += `
                <div style="text-align:center;">
                    <img onclick="openLightbox('${src}')"
                         src="${src}"
                         style="width:200px;border-radius:10px;cursor:pointer;">
                    <p><strong>${date}</strong></p>
                </div>`;
            }
        });

        out += "</div>";
        box.innerHTML = out || "<p>No images found</p>";
        show(box);

    } catch (e) {
        box.innerHTML = "<p>Error loading images</p>";
        show(box);
    }
});


function openLightbox(src) {
    document.getElementById("lightbox-img").src = src.replace("&width=200", "");
    document.getElementById("lightbox").style.display = "flex";
}

function closeLightbox() {
    document.getElementById("lightbox").style.display = "none";
}
</script>

<h2>REG 2 VIN</h2>

<div class="input-group">
    <input type="text" id="inputText" placeholder="Enter Reg..." />
    <button onclick="executeCurl()">Go</button>
</div>

<pre id="output"></pre>

<script>
async function executeCurl() {
    const reg = document.getElementById("inputText").value.trim().toUpperCase();
    const box = document.getElementById("output");

    if (!reg) return;

    box.innerHTML = "Loading vehicle...";
    show(box);

    try {
        const res = await fetch(`https://quiet-lake-1010.hsk10.workers.dev/?reg=${reg}`);
        const data = await res.json();

        const v = data.data;

        box.innerHTML = `
        <strong>VIN:</strong> ${v.vin || "N/A"}<br>
        <strong>Reg:</strong> ${v.reg || reg}<br>
        <strong>Make:</strong> ${v.manufacturer || "N/A"}<br>
        <strong>Model:</strong> ${v.model || "N/A"}<br>
        <strong>Colour:</strong> ${v.colour || "N/A"}<br>
        <strong>Fuel:</strong> ${v.fuel || "N/A"}<br>
        <strong>Year:</strong> ${v.year || "N/A"}
        `;

        show(box);

    } catch (e) {
        box.innerHTML = "Error";
        show(box);
    }
}
</script>

</body>
</html>
